services:
  - type: web
    name: car-hunter-ai
    env: python
    buildCommand: pip install -r requirements.txt && python3 -m playwright install chromium
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
